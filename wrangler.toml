name = "who-to-play-with"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Serve static assets from dist/
[assets]
directory = "./dist"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "who-to-play-with-db"
database_id = "YOUR_D1_DATABASE_ID"

# Environment variables (set via `wrangler secret put` for production)
# GOOGLE_CLIENT_ID - Google OAuth2 client ID
# GOOGLE_CLIENT_SECRET - Google OAuth2 client secret
# GITHUB_CLIENT_ID - GitHub OAuth2 client ID
# GITHUB_CLIENT_SECRET - GitHub OAuth2 client secret
# JWT_SECRET - Secret for signing JWT sessions (generate with: openssl rand -base64 32)
# APP_BASE_URL - Frontend base URL for OAuth redirects
